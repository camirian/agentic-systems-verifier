steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.frontend'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_BASE=https://asv-backend-705975127752.us-central1.run.app'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asv-repo/asv-frontend:latest'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/asv-repo/asv-frontend:latest'
